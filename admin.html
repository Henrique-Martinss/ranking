<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin</title>

    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
</head>

<body>

    <h1>⚙️ Painel Admin</h1>

    <div class="container">

        <form id="form">
            <fieldset>
                <legend>Adicionar Jogador</legend>

                <div class="form-row">
                    <label for="nome">Nome do Jogador:</label>
                    <input type="text" id="nome" placeholder="Nome" required>
                </div>

                <div class="form-row">
                    <label for="level">Level do Jogador:</label>
                    <input type="number" id="level" placeholder="Level do jogador" required>
                </div>

                <button type="submit">Adicionar</button>
            </fieldset>
        </form>


        <label for="dataAtualizacao">Data da Última Atualização:</label>
        <input type="date" id="dataAtualizacao" aria-label="Data da Última Atualização">

        <div id="lista-admin"></div>

    </div>

    <button type="button" id="logoutBtn">Sair</button>

    <!-- Firebase SDKs (Versão COMPAT) -->
    <!-- 1. O 'coração' do Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

    <!-- 2. O módulo de LOGIN (O que você está adicionando agora ) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <!-- 3. O módulo de BANCO DE DADOS -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

    <!-- Seus scripts personalizados -->
    <script src="firebase.js"></script>
    <script src="admin.js"></script>



</body>

</html>
