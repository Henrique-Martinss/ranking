<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrativo Seguro</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #e2e8f0; display: flex; min-height: 100vh; justify-content: center; align-items: center; font-family: 'Luckiest Guy', cursive; margin: 0; padding: 20px; }
        .login-box { background: #1a202c; padding: 40px; border-radius: 12px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4 ); border: 1px solid #00e5ff; }
        h2 { color: #00E5ff; margin-bottom: 30px; font-size: 2.2em; }
        form { display: flex; flex-direction: column; gap: 15px; }
        input { width: 100%; padding: 12px; border: 1px solid #4a5568; border-radius: 6px; background: #2d3748; color: #e2e8f0; font-size: 1em; box-sizing: border-box; font-family: sans-serif; }
        button { width: 100%; padding: 12px; margin-top: 20px; border-radius: 8px; border: none; background: linear-gradient(135deg, #00e5ff, #6c3bff); color: white; font-size: 1.1em; cursor: pointer; font-family: 'Luckiest Guy', cursive; }
        #message { color: #ff4d4d; margin-top: 15px; font-size: 0.9em; font-family: sans-serif; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Admin Login</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Seu e-mail" required>
            <input type="password" id="pass" placeholder="Sua senha" required>
            <button type="submit">Entrar</button>
        </form>
        <p id="message"></p>
    </div>

    <!-- Firebase SDKs (Versão Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="firebase.js"></script>

    <script>
        const loginForm = document.getElementById("loginForm" );
        const messageElement = document.getElementById("message");

        loginForm.addEventListener("submit", (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const pass = document.getElementById("pass").value;

            messageElement.textContent = "Autenticando...";

            firebase.auth().signInWithEmailAndPassword(email, pass)
                .then(() => {
                    window.location.href = "admin.html";
                })
                .catch((error) => {
                    messageElement.textContent = "Erro: " + error.message;
                });
        });
    </script>
</body>
</html>
