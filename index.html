<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking XP</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/burbank-big-condensed-black">
</head>
<body>
    <div class="imagem-fundo">
        <img src="img/imagem-fundo.webp" alt="Fundo">
    </div>
    <section class="hero">
        <h1>🏆 RANKING LEVEL</h1>
        <p>Top jogadores que mais farmaram XP essa semana</p>
        <a href="#ranking" class="botao">Ver Ranking</a>
    </section>

    <section id="ranking" class="ranking">
        <h2>🔥 Top da Semana</h2>

        <div class="ranking-header">
            <span>#</span>
            <span>Jogador</span>
            <span>XP</span>
            <span>Variação</span>
        </div>

        <div id="ranking-lista"></div>
        <p class="atualizacao" id="data"></p>
    </section>
    

</body>

<script src="script.js"></script>

</html>
